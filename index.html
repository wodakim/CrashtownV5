<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Crashtown - Main Menu</title>
    <link rel="stylesheet" href="mainmenu.css" />
  </head>
  <body>
    <section id="bootScreen" class="boot-screen" aria-label="Chargement initial">
      <video id="introVideo" class="intro-video" src="/Assets/Video/Intro.mp4" autoplay muted playsinline preload="auto" poster="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"></video>
      <div class="boot-overlay">
        <p id="bootStatus">Préparation du jeu...</p>
        <button id="skipIntroBtn" class="skip-intro-btn" type="button">Passer</button>
      </div>
    </section>

    <main class="app app-hidden" aria-label="Menu principal Crashtown">
      <div class="menu-scene" aria-hidden="true">
        <div id="menuRoad" class="menu-road">
          <img id="roadImg1" src="/Assets/Road/Background_mainmenu_nature_base_v01.png" alt="" />
          <img id="roadImg2" src="/Assets/Road/Background_mainmenu_nature_base_v01.png" alt="" />
        </div>
        <div id="menuTraffic" class="menu-traffic"></div>
      </div>
      <div id="menuTrees" class="menu-trees" aria-hidden="true"></div>

      <div class="top-actions">
        <button class="icon-btn" id="profileBtn" aria-label="Ouvrir profil joueur">
          <img
            src="/Assets/UI/Buttons/ui_btn_profile_icon_v01.svg"
            alt="Bouton profil"
            data-asset-name="ui_btn_profile_icon_v01.svg"
          />
        </button>
        <button class="icon-btn" id="settingsBtn" aria-label="Ouvrir paramètres">
          <img
            src="/Assets/UI/Buttons/ui_btn_settings_icon_v01.svg"
            alt="Bouton paramètres"
            data-asset-name="ui_btn_settings_icon_v01.svg"
          />
        </button>
      </div>

      <section class="content-stack">
        <section class="logo-panel">
          <img
            class="logo"
            src="/Assets/Branding/Logo/Brand_crashtown_logo_main_v02.svg"
            alt="Logo Crashtown"
            data-asset-name="Brand_crashtown_logo_main_v02.svg"
          />
        </section>

        <section class="daily-reward">
          <img
            class="daily-popup"
            src="/Assets/UI/Pop-up/ui_popup_daily_reward_base_v01.svg"
            alt="Daily reward"
            data-asset-name="ui_popup_daily_reward_base_v01.svg"
          />
          <button id="dailyGiftBtn" class="gift-btn" aria-label="Récupérer la récompense du jour">
            <img
              src="/Assets/UI/Icons/ui_icon_gift_v01.svg"
              alt="Icône cadeau"
              data-asset-name="ui_icon_gift_v01.svg"
            />
          </button>
        </section>

        <button class="shop-btn" id="shopBtn" aria-label="Ouvrir boutique">
          <img
            src="/Assets/UI/Buttons/ui_btn_shop_base_v01.svg"
            alt="Bouton shop"
            data-asset-name="ui_btn_shop_base_v01.svg"
          />
        </button>

        <button class="play-btn" id="playBtn" aria-label="Jouer">
          <img
            src="/Assets/UI/Buttons/ui_btn_play_base_v01.svg"
            alt="Bouton play"
            data-asset-name="ui_btn_play_base_v01.svg"
          />
        </button>

        <section class="messages-panel" aria-label="Messages">
          <img
            src="/Assets/UI/Pop-up/ui_popup_messages_base_v01.svg"
            alt="Messages"
            data-asset-name="ui_popup_messages_base_v01.svg"
          />
          <div class="messages-input-box" aria-label="Zone message admin">
            <p id="menuMessageBox" aria-live="polite"></p>
          </div>
        </section>
      </section>

      <div class="overlay hidden" id="overlay"></div>


      <section class="popup hidden" id="constructionPopup" aria-label="Fonction en construction">
        <button class="close-btn" data-close-popup="constructionPopup" aria-label="Fermer message construction">
          <img src="/Assets/UI/Buttons/ui_btn_close_base_v01.svg" alt="Fermer" data-asset-name="ui_btn_close_base_v01.svg" />
        </button>
        <h2>EN CONSTRUCTION</h2>
        <p id="constructionText">Cette fonctionnalité arrive bientôt.</p>
      </section>

      <section class="popup hidden" id="settingsPopup" aria-label="Paramètres">
        <button class="close-btn" data-close-popup="settingsPopup" aria-label="Fermer paramètres">
          <img src="/Assets/UI/Buttons/ui_btn_close_base_v01.svg" alt="Fermer" data-asset-name="ui_btn_close_base_v01.svg" />
        </button>
        <h2>PARAMÈTRES</h2>
        <label for="volumeSlider">Volume musique</label>
        <input id="volumeSlider" type="range" min="0" max="100" value="65" />
        <div class="quality-choice">
          <p>Mode voitures</p>
          <div class="toggle-group">
            <button class="toggle active" data-quality="hd">HD</button>
            <button class="toggle" data-quality="pixel">PIXEL</button>
          </div>
        </div>
      </section>

      <section class="popup hidden" id="profilePopup" aria-label="Profil joueur">
        <button class="close-btn" data-close-popup="profilePopup" aria-label="Fermer profil">
          <img src="/Assets/UI/Buttons/ui_btn_close_base_v01.svg" alt="Fermer" data-asset-name="ui_btn_close_base_v01.svg" />
        </button>
        <h2>PROFIL JOUEUR</h2>
        <label for="profileNickname">Pseudo</label>
        <input id="profileNickname" type="text" maxlength="20" placeholder="CrashPilot" />
        <p id="profileLevel">Niveau: 1</p>
        <p id="profileRank">Classement: Rookie</p>
        <button id="saveProfileBtn" class="action-btn" type="button">Sauvegarder profil</button>
      </section>

      <section class="popup hidden" id="shopPopup" aria-label="Boutique voitures">
        <button class="close-btn" data-close-popup="shopPopup" aria-label="Fermer boutique">
          <img src="/Assets/UI/Buttons/ui_btn_close_base_v01.svg" alt="Fermer" data-asset-name="ui_btn_close_base_v01.svg" />
        </button>
        <h2>BOUTIQUE</h2>
        <div class="carousel">
          <button id="prevCar" aria-label="Voiture précédente">◀</button>
          <img id="carImage" alt="Voiture en vente" />
          <button id="nextCar" aria-label="Voiture suivante">▶</button>
        </div>
        <div class="shop-variant-switch">
          <button id="shopVariantPrev" aria-label="Variante précédente">▲</button>
          <span id="shopVariantLabel">HD</span>
          <button id="shopVariantNext" aria-label="Variante suivante">▼</button>
        </div>
        <p id="carName"></p>
        <p id="walletAmount">Crédits: 0</p>
        <button id="equipFromShopBtn" class="action-btn" type="button">Équiper pour la course</button>
      </section>
    </main>

    <section id="navLoading" class="nav-loading hidden" aria-label="Chargement navigation">
      <div class="nav-loading-card">
        <p>Chargement…</p>
      </div>
    </section>

    <audio id="mainMenuMusic" src="/Assets/Sounds/Mainmenu/Song_mainmenu_base_v01.mp3" loop></audio>
    <script type="module" src="mainmenu.js"></script>
  </body>
</html>
